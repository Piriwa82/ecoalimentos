<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Rutas - EcoAlimentos</title>
    <link rel="icon" href="img/logo.png">
    
    <!-- Google Fonts: Outfit (modern, geometric, extremely premium) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1e1e1e;
            --accent-primary: #49af75;
            --accent-secondary: #bad798;
            --accent-gradient: linear-gradient(135deg, #49af75 0%, #bad798 100%);
            --text-primary: #ffffff;
            --text-secondary: #9f9f9f;
            --border-color: #262626;
            --danger: #ff4d4d;
            --danger-gradient: linear-gradient(135deg, #ff4d4d 0%, #ff8080 100%);
            --blue-gradient: linear-gradient(135deg, #2f80ed 0%, #56ccf2 100%);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @media (min-width: 769px) {
            body {
                overflow: hidden;
            }
        }

        /* Glassmorphism Header */
        header {
            background-color: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.8em 2em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 4000;
            height: 70px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo img {
            width: 42px;
            height: 42px;
            filter: drop-shadow(0 2px 8px rgba(73, 175, 117, 0.3));
        }

        .header-logo h1 {
            font-size: 1.3em;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .header-actions a {
            color: var(--text-primary);
            text-decoration: none;
            background: var(--accent-gradient);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(73, 175, 117, 0.2);
            transition: var(--transition);
        }

        .header-actions a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(73, 175, 117, 0.4);
        }

        .main-container {
            display: grid;
            grid-template-columns: 440px 1fr;
            flex: 1;
            position: relative;
        }

        @media (min-width: 769px) {
            .main-container {
                height: calc(100vh - 70px);
            }
        }

        /* Sidebar & Drawer */
        .sidebar {
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5em;
            overflow-y: auto;
            gap: 1.2em;
            z-index: 3000;
            scrollbar-width: auto;
            scrollbar-color: var(--primary-color) rgba(255, 255, 255, 0.05);
            max-height: calc(100vh - 70px);
            height: calc(100vh - 70px);
            box-sizing: border-box;
        }

        .sidebar::-webkit-scrollbar {
            width: 10px;
            display: block !important;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
            border: 2px solid var(--bg-secondary);
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #336644;
        }

        .section-title {
            font-size: 1em;
            font-weight: 600;
            color: var(--accent-secondary);
            margin-bottom: 0.6em;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .panel-card {
            background-color: var(--bg-tertiary);
            border-radius: 12px;
            padding: 1.2em;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .panel-card:hover {
            border-color: rgba(73, 175, 117, 0.2);
        }

        /* Form Controls */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        .form-group label {
            font-size: 0.8em;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .input-row {
            display: flex;
            gap: 8px;
            position: relative;
        }

        .input-container {
            position: relative;
            flex: 1;
        }

        input[type="text"], textarea {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.9em;
            width: 100%;
            outline: none;
            transition: var(--transition);
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(73, 175, 117, 0.15);
        }

        /* Buttons styling */
        .btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.9em;
            box-shadow: 0 4px 10px rgba(73, 175, 117, 0.15);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(73, 175, 117, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-secondary);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: var(--accent-gradient);
            color: white;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            box-shadow: none;
        }

        .btn-danger:hover {
            background: var(--danger-gradient);
            color: white;
        }

        /* Google Maps Autocomplete Dropdown */
        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 5000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-top: 6px;
            display: none;
        }

        .suggestion-item {
            padding: 12px 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
        }

        .suggestion-item:hover {
            background-color: rgba(73, 175, 117, 0.12);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-icon {
            color: var(--accent-primary);
            font-size: 1.15em;
            background-color: rgba(73, 175, 117, 0.1);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .suggestion-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .suggestion-title {
            font-weight: 500;
            font-size: 0.9em;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .suggestion-subtitle {
            font-size: 0.75em;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Textarea quick import */
        textarea {
            height: 80px;
            resize: none;
            font-size: 0.85em;
        }

        /* Address List container */
        .address-list-container {
            display: flex;
            flex-direction: column;
            min-height: auto;
            overflow: visible;
        }

        .address-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
            overflow-y: visible;
        }

        .address-item {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            cursor: grab;
            transition: var(--transition);
        }

        .address-item:active {
            cursor: grabbing;
        }

        .address-item.dragging {
            opacity: 0.4;
            border-color: var(--accent-primary);
            transform: scale(0.98);
        }

        .address-details {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            overflow: hidden;
        }

        .address-index {
            background: var(--accent-gradient);
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: 600;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(73, 175, 117, 0.3);
        }

        .address-text {
            font-size: 0.85em;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .address-actions {
            display: flex;
            gap: 4px;
        }

        .action-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            transition: var(--transition);
        }

        .action-icon-placeholder {
            width: 32px;
            height: 32px;
            display: inline-block;
            flex-shrink: 0;
        }

        .action-icon:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--accent-secondary);
        }

        .action-icon.delete-btn:hover {
            color: var(--danger);
            background-color: rgba(255, 77, 77, 0.1);
        }

        /* Map area */
        .map-container {
            position: relative;
            height: 100%;
            width: 100%;
        }

        #map {
            height: 100%;
            width: 100%;
            background-color: var(--bg-primary);
        }

        /* Floating route bar */
        .route-actions-bar {
            position: fixed;
            bottom: 40px;
            left: calc(50vw + 220px); /* Centrado respecto a la zona del mapa (pantalla - sidebar) */
            transform: translateX(-50%);
            z-index: 1000;
            background-color: rgba(20, 20, 20, 0.85);
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex;
            gap: 12px;
            border: 1px solid var(--accent-primary);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Floating drawer toggle for mobile */
        .drawer-toggle-btn {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 3500;
            background: var(--accent-gradient);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            font-size: 1.2em;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .drawer-toggle-btn:hover {
            transform: scale(1.05);
        }

        /* Importador Word / EstГ©tica de subida */
        .file-upload-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5em 1em;
            border: 2px dashed #43815e;
            border-radius: 12px;
            background-color: rgba(67, 129, 94, 0.03);
            transition: all 0.2s ease;
            cursor: pointer;
            text-align: center;
            margin: 10px auto;
            width: 95%;
            box-sizing: border-box;
        }
        .file-upload-container:hover {
            border-color: #336644;
            background-color: rgba(67, 129, 94, 0.08);
            transform: translateY(-1px);
        }
        .file-upload-label {
            font-size: 1em;
            font-weight: 600;
            color: #43815e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: transparent;
        }
        .file-name-display {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 6px;
            word-break: break-all;
            font-style: italic;
            background-color: transparent;
        }
        .failed-geocode-item {
            border-left: 4px solid #e67e22 !important;
            background-color: rgba(230, 126, 34, 0.05) !important;
        }
        .warning-badge {
            margin-right: 5px;
            cursor: help;
        }

        .clear-link-btn:hover {
            background-color: rgba(231, 76, 60, 0.1) !important;
            color: #ff5e4d !important;
        }

        /* Options dropdown menu */
        .options-menu-popup {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 5000;
            max-height: 250px;
            overflow-y: auto;
            margin-top: 5px;
            padding: 8px 0;
        }

        .options-menu-header {
            padding: 8px 15px;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--accent-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 5px;
            text-align: left;
        }

        .options-menu-item {
            padding: 10px 15px;
            font-size: 0.9em;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: left;
        }

        .options-menu-item:hover {
            background-color: rgba(73, 175, 117, 0.1);
            color: var(--accent-primary);
        }

        .options-menu-item.raw-fallback {
            border-top: 1px dashed var(--border-color);
            color: var(--text-secondary);
            font-style: italic;
        }
        
        .options-menu-item.raw-fallback:hover {
            color: var(--danger);
            background-color: rgba(255, 77, 77, 0.05);
        }

        /* Modal Ver Pedido Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
            width: 90%;
            max-width: 450px;
            padding: 1.5em;
            display: flex;
            flex-direction: column;
            gap: 1em;
            transform: scale(0.9);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .modal-overlay.open .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .modal-header h3 {
            color: var(--primary-color);
            font-size: 1.2em;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2em;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close-btn:hover {
            color: var(--danger);
        }

        .modal-body {
            font-size: 0.95em;
            line-height: 1.5;
            color: var(--text-primary);
        }
        
        .modal-info-row {
            margin-bottom: 10px;
            text-align: left;
        }
        
        .modal-info-label {
            font-weight: 600;
            color: var(--accent-secondary);
        }
        
        .modal-products-list {
            margin-top: 15px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
        }
        
        .modal-product-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .modal-product-item span {
            color: var(--text-primary);
        }
        
        .modal-product-item:last-child {
            border-bottom: none;
        }

        /* Botones Sticky al fondo del Sidebar */
        .sidebar-footer {
            position: sticky;
            bottom: -1.2em; /* Alineado con el padding de la barra lateral */
            left: 0;
            right: 0;
            background-color: var(--bg-secondary);
            padding: 15px 0 10px 0;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        .sidebar-footer .btn {
            flex: 1;
            padding: 12px 8px;
            font-size: 0.85em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        /* Mobile Responsive adjustments */
        @media (max-width: 768px) {
            body {
                overflow: hidden !important; /* Evitar scroll del body en mГіvil para mejor uso del menГє */
            }

            .main-container {
                grid-template-columns: 1fr;
                height: calc(100vh - 70px);
                position: relative;
                overflow: hidden;
            }

            .sidebar {
                position: absolute;
                top: 0;
                left: 0;
                transform: translateX(-100%);
                width: 85%;
                max-width: 350px;
                height: 100%;
                z-index: 3400;
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 5px 0 25px rgba(0,0,0,0.5);
                border-right: 1px solid var(--border-color);
                overflow-y: auto;
                background-color: var(--bg-secondary);
                padding: 1.2em;
                display: flex;
                flex-direction: column;
                gap: 1.2em;
                -webkit-overflow-scrolling: touch;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .map-container {
                height: 100%;
                width: 100%;
                flex-grow: 1;
            }

            .drawer-toggle-btn {
                display: flex !important;
                background: var(--accent-gradient);
                color: white;
                border: none;
                width: 42px;
                height: 42px;
                border-radius: 8px;
                font-size: 1.1em;
                cursor: pointer;
                align-items: center;
                justify-content: center;
                transition: var(--transition);
                margin-right: 12px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
                position: static;
            }

            .route-actions-bar {
                position: fixed;
                width: 90%;
                bottom: 20px;
                left: 5%;
                transform: none;
                padding: 10px;
                box-sizing: border-box;
                display: flex;
                gap: 10px;
                justify-content: space-between;
                z-index: 3300;
            }

            .route-actions-bar .btn {
                flex: 1;
                padding: 12px 8px;
                font-size: 0.8em;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">
            <!-- Drawer Toggle Button (Visible only on Mobile) -->
            <button class="drawer-toggle-btn" id="drawer-toggle" title="Abrir menГє">
                <i class="fa-solid fa-bars"></i>
            </button>
            <img src="img/logo-sin-borde.png" alt="EcoAlimentos Logo">
            <h1>EcoAlimentos - Planificador</h1>
        </div>
        <div class="header-actions">
            <a href="index.html" target="_blank"><i class="fa-solid fa-store"></i> Ir a la Tienda</a>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar Planificador (Drawer on Mobile) -->
        <div class="sidebar" id="sidebar">
            <!-- Origen -->
            <div class="panel-card">
                <div class="section-title">
                    <i class="fa-solid fa-house-chimney"></i>
                    <span>Punto de Partida (DepГіsito)</span>
                </div>
                <div class="form-group">
                    <div class="input-row">
                        <div class="input-container">
                            <input type="text" id="origen-input" value="Г‘uflo de ChГЎvez 3810, CГіrdoba, Argentina" placeholder="Ej: Av. ColГіn 100, CГіrdoba">
                        </div>
                        <button class="btn" id="origen-save-btn" title="Guardar origen"><i class="fa-solid fa-floppy-disk"></i></button>
                    </div>
                </div>
            </div>

            <!-- Carga de Direcciones -->
            <div class="panel-card">
                <div class="section-title">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Cargar Direcciones</span>
                </div>
                
                <!-- Manual -->
                <div class="form-group">
                    <label>Buscar y agregar direcciГіn (CГіrdoba y alrededores):</label>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map;

        // Limpieza automГЎtica al cambiar de dГ­a (a las 00:00)
        const todayStr = new Date().toLocaleDateString('es-AR');
        const lastActiveDate = localStorage.getItem('eco_last_active_date');
        if (lastActiveDate && lastActiveDate !== todayStr) {
            localStorage.removeItem('eco_addresses');

        }
        localStorage.setItem('eco_last_active_date', todayStr);

        let addresses = JSON.parse(localStorage.getItem('eco_addresses')) || [];
        let originAddress = localStorage.getItem('eco_origin') || "Г‘uflo de ChГЎvez 3810, CГіrdoba, Argentina";
        let originCoords = JSON.parse(localStorage.getItem('eco_origin_coords')) || { lat: -31.4255339, lon: -64.2388813 };
        
        // URL de tu Apps Script de Google Sheets para leer pedidos automГЎticamente
        const googleSheetsAppURL = "https://script.google.com/macros/s/AKfycbw4S6DTNTGSk9QWRCpISerEvoVgMaUSLnDYzOxOtRiGGXAWd4Ohm22xflcT07Qy7JxTOw/exec";

        document.getElementById('origen-input').value = originAddress;

        // Inicializar Mapa
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([originCoords.lat, originCoords.lon], 13);
            
            // AГ±adir control de zoom en la esquina superior derecha (por encima de los botones flotantes)
            L.control.zoom({ position: 'topright' }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
            }).addTo(map);

            updateMapElements();
        }

        // Distancia exacta Haversine
        function getDistanceKm(lat1, lon1, lat2, lon2) {
            let R = 6371; // km
            let dLat = (lat2 - lat1) * Math.PI / 180;
            let dLon = (lon2 - lon1) * Math.PI / 180;
            let a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // GeocodificaciГіn usando Nominatim (gratuito)
        // Normalizar nombres de calles comunes con errores ortogrГЎficos en CГіrdoba Capital
        function normalizarOrtografiaCalle(calle) {
            let res = calle.trim();
            let lower = res.toLowerCase();
            
            // Reemplazar errores ortogrГЎficos comunes en CГіrdoba
            if (lower.includes("velez sarfield") || lower.includes("vГ©lez sarfield")) {
                res = res.replace(/velez\s+sarfield/i, "VГ©lez SГЎrsfield").replace(/vГ©lez\s+sarfield/i, "VГ©lez SГЎrsfield");
            } else if (lower.includes("sarfield")) {
                res = res.replace(/sarfield/i, "SГЎrsfield");
            }
            
            if (lower.includes("sabatini") && !lower.includes("sabattini")) {
                res = res.replace(/sabatini/i, "Sabattini");
            }
            if (lower.includes("valparaiso")) {
                res = res.replace(/valparaiso/i, "ValparaГ­so");
            }
            if (lower.includes("nuГ±ez") && !lower.includes("nГєГ±ez")) {
                res = res.replace(/nuГ±ez/i, "NГєГ±ez");
            }
            if (lower.includes("ohiggins") || lower.includes("o higgins")) {
                res = res.replace(/ohiggins/i, "O'Higgins").replace(/o\s+higgins/i, "O'Higgins");
            }
            if (lower.includes("fuerza aerea") || lower.includes("fuerza aГ©rea")) {
                res = res.replace(/fuerza\s+aerea/i, "Fuerza AГ©rea");
            }
            if (lower.includes("colon") && !lower.includes("colГіn")) {
                res = res.replace(/colon/i, "ColГіn");
            }
            
            return res;
        }

        // GeocodificaciГіn usando ArcGIS (prioritario) o Nominatim como fallback
        async function geocodeAddress(addressText) {
            let query = normalizarOrtografiaCalle(addressText);
            if (!query.toLowerCase().includes("cГіrdoba") && !query.toLowerCase().includes("cordoba")) {
                query += ", CГіrdoba, Argentina";
            } else if (!query.toLowerCase().includes("argentina")) {
                query += ", Argentina";
            }

            // CГіrdoba Capital Centroid Coords
            const cbaLat = -31.4167;
            const cbaLon = -64.1833;
            const maxRadiusKm = 15; // LГ­mite estricto del anillo y alrededores cercanos

            // Helper para validar si un resultado estГЎ en la zona permitida
            function estaEnZonaPermitida(lat, lon) {
                if (!lat || !lon) return false;
                let dist = getDistanceKm(lat, lon, cbaLat, cbaLon);
                return dist <= maxRadiusKm;
            }

            // 1. Prioridad 1: ArcGIS (Esri) Geocoder (priorizado cerca de CГіrdoba)
            try {
                let arcgisUrl = `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates?f=json&singleLine=${encodeURIComponent(query)}&location=${cbaLon},${cbaLat}&distance=15000&maxLocations=1&outFields=*`;
                let response = await fetch(arcgisUrl);
                let data = await response.json();
                if (data.candidates && data.candidates.length > 0) {
                    let candidate = data.candidates[0];
                    if (candidate.score >= 80 && estaEnZonaPermitida(candidate.location.y, candidate.location.x)) {
                        return {
                            lat: candidate.location.y,
                            lon: candidate.location.x,
                            display_name: candidate.address
                        };
                    }
                }
            } catch (e) {
                console.error("Error geocodificando con ArcGIS: ", e);
            }

            // 2. Prioridad 2: Nominatim (OpenStreetMap)
            try {
                // Intentar buscar la direcciГіn completa restringida estrictamente a CГіrdoba Capital (dentro de CircunvalaciГіn)
                let response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&viewbox=-64.28,-31.35,-64.10,-31.48&bounded=1&limit=1&email=ecoalimentos.cba@gmail.com`);
                let data = await response.json();
                
                if (data && data.length > 0) {
                    let lat = parseFloat(data[0].lat);
                    let lon = parseFloat(data[0].lon);
                    if (estaEnZonaPermitida(lat, lon)) {
                        return {
                            lat: lat,
                            lon: lon,
                            display_name: data[0].display_name
                        };
                    }
                }

                // 3. Si no se encuentra, intentar buscar solo la calle como aproximaciГіn
                let cleanQuery = addressText.replace(/\d+$/, '').trim();
                if (cleanQuery && cleanQuery !== addressText) {
                    let fallbackQuery = cleanQuery;
                    if (!fallbackQuery.toLowerCase().includes("cГіrdoba") && !fallbackQuery.toLowerCase().includes("cordoba")) {
                        fallbackQuery += ", CГіrdoba, Argentina";
                    }
                    
                    let fbResponse = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(fallbackQuery)}&viewbox=-64.28,-31.35,-64.10,-31.48&bounded=1&limit=1&email=ecoalimentos.cba@gmail.com`);
                    let fbData = await fbResponse.json();
                    
                    if (fbData && fbData.length > 0) {
                        let lat = parseFloat(fbData[0].lat);
                        let lon = parseFloat(fbData[0].lon);
                        if (estaEnZonaPermitida(lat, lon)) {
                            return {
                                lat: lat,
                                lon: lon,
                                display_name: fbData[0].display_name
                            };
                        }
                    }
                }
            } catch (e) {
                console.error("Error geocodificando con Nominatim: ", e);
            }
            return null;
        }

        const sleep = ms => new Promise(res => setTimeout(res, ms));

        // Cargar Mammoth.js de forma dinГЎmica para leer archivos Word (.docx)
        function loadMammoth(callback) {
            if (typeof mammoth !== 'undefined') {
                callback();
                return;
            }
            let script = document.createElement("script");
            script.src = "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js";
            script.onload = callback;
            document.head.appendChild(script);
        }

        // Separar la direcciГіn de la lista de productos buscando la transiciГіn de dГ­gito a mayГєscula o minГєscula a mayГєscula
        function separarDireccionDeProductos(texto) {
            let original = texto.trim();
            
            // 1. Si el dueГ±o usГі el guion (-) como separador de la direcciГіn
            if (original.includes(' -')) {
                let parts = original.split(' -');
                if (parts[0].trim()) {
                    return parts[0].trim();
                }
            }
            if (original.includes('-')) {
                let parts = original.split('-');
                let potentialAddress = parts[0].trim();
                // Si la parte antes del guion es corta (tГ­pico de una calle, max 6 palabras), la tomamos
                if (potentialAddress && potentialAddress.split(/\s+/).length < 7) {
                    return potentialAddress;
                }
            }

            // Pre-procesar para separar nГєmeros pegados a letras (ej: 2377Mix -> 2377 Mix)
            original = original.replace(/(\d+)([a-zA-ZГЎГ©Г­ГіГєГ±ГЃГ‰ГЌГ“ГљГ‘]+)/g, '$1 $2');
            
            // 2. Si la direcciГіn tiene un nГєmero de puerta (altura), la direcciГіn termina en ese nГєmero
            // Buscamos un nГєmero de 1 a 5 dГ­gitos (puede tener barra para nГєmeros compuestos, ej: 948/950)
            let matchNumber = original.match(/^(.*?\b\d+(?:\/\d+)?\b)/);
            if (matchNumber) {
                return matchNumber[1].trim();
            }
            
            // 3. Si no tiene nГєmero de puerta, usamos divisiГіn por palabras clave de productos
            const productKeywords = [
                "mix", "granola", "nuez", "almendras", "almendra", "castaГ±as", "castaГ±a", 
                "manГ­", "mani", "semillas", "semilla", "almohaditas", "almohadita", 
                "aceite", "aceitunas", "aceituna", "maca", "colГЎgeno", "colageno", 
                "pasta", "azГєcar", "azucar", "bicarbonato", "cacao", "harina", 
                "fГ©cula", "fecula", "cГєrcuma", "curcuma", "copos", "copo", "arroz", 
                "avena", "chalitas", "chalita", "pepas", "pepa", "lenteja", "poroto", 
                "tutucas", "tutuca", "miel", "arГЎndanos", "arandanos", "ciruela", 
                "salsa", "yerba", "condimento", "laurel", "orГ©gano", "oregano", 
                "pimienta", "pimentГіn", "pimenton", "barritas", "barrita", "maГ­z", 
                "maiz", "garbanzo", "garbanzos", "lentejas", "porotos", "dulce", 
                "leche", "queso", "chocolate", "chocolates", "alfajor", "alfajores"
            ];
            
            let words = original.split(/\s+/);
            for (let i = 0; i < words.length; i++) {
                let cleanWord = words[i].toLowerCase().replace(/[^a-zГЎГ©Г­ГіГєГ±]/g, '');
                if (productKeywords.includes(cleanWord)) {
                    let address = words.slice(0, i).join(' ').trim();
                    if (address) {
                        return address;
                    }
                }
            }
            
            // 4. Fallback: TransiciГіn de dГ­gito a mayГєscula o minГєscula a mayГєscula sin espacios
            let matchDigitUpper = original.search(/\d[A-ZГЃГ‰ГЌГ“ГљГ‘]/);
            if (matchDigitUpper !== -1) {
                return original.substring(0, matchDigitUpper + 1).trim();
            }
            
            let matchLowerUpper = original.search(/[a-zГЎГ©Г­ГіГєГ±][A-ZГЃГ‰ГЌГ“ГљГ‘]/);
            if (matchLowerUpper !== -1) {
                return original.substring(0, matchLowerUpper + 1).trim();
            }
            
            return original;
        }

        // Extraer direcciones del texto segГєn el formato del dueГ±o, capturando datos del pedido
        function procesarTextoPedidos(text) {
            let lines = text.split(/\r?\n/);
            let extractedAddresses = [];
            
            for (let idx = 0; idx < lines.length; idx++) {
                let line = lines[idx].trim();
                if (!line) continue;
                
                // Regex para buscar cantidad entre parГ©ntesis (ej: "(x8)", "(x12)", "(5)")
                let match = line.match(/\(x?\s*\d+\)/i);
                if (match) {
                    let parts = line.split(')');
                    if (parts.length > 1) {
                        let addressPart = parts.slice(1).join(')').trim();
                        
                        // Nombre del cliente
                        let clientName = line.split('(')[0].trim();
                        
                        // Cantidad
                        let qty = match[0].trim();
                        
                        // Separar la direcciГіn y los posibles productos en la misma lГ­nea
                        let address = "";
                        let productsText = "";
                        
                        let originalAddressPart = addressPart.trim();
                        
                        // Intentar separar por " -" o "- " primero
                        if (originalAddressPart.includes(' -')) {
                            let splitParts = originalAddressPart.split(' -');
                            let potentialAddress = splitParts[0].trim();
                            let potentialProducts = splitParts.slice(1).join(' -').trim();
                            
                            let isActuallyProducts = potentialProducts.includes('|') || 
                                /almendra|chala|pepa|mix|fruto|seco|granola|mani|avena|aceite|miel|pasa|uva|semilla|tutuca|azucar|harina|coco|arroz|casta/i.test(potentialProducts);
                            
                            if (isActuallyProducts) {
                                address = potentialAddress;
                                productsText = potentialProducts;
                            } else {
                                address = originalAddressPart;
                            }
                        } else if (originalAddressPart.includes('- ')) {
                            let splitParts = originalAddressPart.split('- ');
                            let potentialAddress = splitParts[0].trim();
                            let potentialProducts = splitParts.slice(1).join('- ').trim();
                            
                            let isActuallyProducts = potentialProducts.includes('|') || 
                                /almendra|chala|pepa|mix|fruto|seco|granola|mani|avena|aceite|miel|pasa|uva|semilla|tutuca|azucar|harina|coco|arroz|casta/i.test(potentialProducts);
                            
                            if (isActuallyProducts) {
                                address = potentialAddress;
                                productsText = potentialProducts;
                            } else {
                                address = originalAddressPart;
                            }
                        } else if (originalAddressPart.includes('-')) {
                            // Encontrar la posiciГіn del Гєltimo guiГіn (para casos pegados como Depto. C-Almendras)
                            let lastDashIndex = originalAddressPart.lastIndexOf('-');
                            let potentialAddress = originalAddressPart.substring(0, lastDashIndex).trim();
                            let potentialProducts = originalAddressPart.substring(lastDashIndex + 1).trim();
                            
                            let isActuallyProducts = potentialProducts.includes('|') || 
                                /almendra|chala|pepa|mix|fruto|seco|granola|mani|avena|aceite|miel|pasa|uva|semilla|tutuca|azucar|harina|coco|arroz|casta/i.test(potentialProducts);
                            
                            if (isActuallyProducts) {
                                address = potentialAddress;
                                productsText = potentialProducts;
                            } else {
                                address = originalAddressPart;
                            }
                        } else {
                            address = separarDireccionDeProductos(originalAddressPart);
                        }
                        
                        // Omitir barras para nГєmeros compuestos y limpiar (ej: 948/950 -> 948)
                        address = address.split('/')[0].trim();
                        address = address.replace(/\s*-\s*$/, '').trim();
                        
                        // Buscar productos en las siguientes lГ­neas (incluso si ya encontramos algo en la misma lГ­nea)
                        let nextIdx = idx + 1;
                        let collectedProducts = [];
                        if (productsText) {
                            collectedProducts.push(productsText);
                        }
                        
                        while (nextIdx < lines.length) {
                            let nextLine = lines[nextIdx].trim();
                            if (nextLine) {
                                // Si contiene un nuevo cliente (que tiene cantidad entre parГ©ntesis) o un separador de secciГіn, paramos
                                if (nextLine.match(/\(x?\s*\d+\)/i) || nextLine.includes('в”Ђв”Ђв”Ђ') || nextLine.includes('===')) {
                                    break;
                                }
                                // De lo contrario, es una lГ­nea de productos
                                collectedProducts.push(nextLine);
                            }
                            nextIdx++; // Si estaba en blanco, seguimos buscando abajo
                        }
                        
                        if (collectedProducts.length > 0) {
                            productsText = collectedProducts.join(' | ');
                            idx = nextIdx - 1; // Avanzar el cursor del bucle principal
                        }
                        
                        let addrLower = address.toLowerCase();
                        if (addrLower && 
                            !addrLower.includes("tengo ubi") && 
                            !addrLower.includes("depГіsito") && 
                            !addrLower.includes("deposito") && 
                            !addrLower.includes("retiro")) {
                            
                            // Evitar duplicar en la extracciГіn inicial
                            let exists = extractedAddresses.some(item => item.text.toLowerCase() === address.toLowerCase());
                            if (!exists) {
                                extractedAddresses.push({
                                    text: address,
                                    client: clientName,
                                    quantity: qty,
                                    products: productsText
                                });
                            }
                        }
                    }
                }
            }
            return extractedAddresses;
        }

        // Geocodificar en lote las direcciones del texto respetando el rate-limit
        async function cargarDireccionesDesdeTexto() {
            let text = document.getElementById('text-word-input').value;
            if (!text.trim()) {
                alert("Por favor, escribe o carga un archivo con las direcciones primero.");
                return;
            }
            
            let targetBtn = document.getElementById('btn-procesar-texto');
            targetBtn.disabled = true;
            
            let addressesList = procesarTextoPedidos(text);
            
            if (addressesList.length === 0) {
                alert("No se encontraron direcciones vГЎlidas en el texto. AsegГєrate de que las lГ­neas tengan el formato: Nombre (xCantidad) DirecciГіn.");
                targetBtn.disabled = false;
                return;
            }
            
            // Mostrar overlay de progreso flotante
            let progressOverlay = document.createElement('div');
            progressOverlay.style.position = 'fixed';
            progressOverlay.style.top = '0';
            progressOverlay.style.left = '0';
            progressOverlay.style.width = '100vw';
            progressOverlay.style.height = '100vh';
            progressOverlay.style.backgroundColor = 'rgba(0,0,0,0.5)';
            progressOverlay.style.zIndex = '9999';
            progressOverlay.style.display = 'flex';
            progressOverlay.style.alignItems = 'center';
            progressOverlay.style.justifyContent = 'center';
            progressOverlay.innerHTML = `
                <div style="background: rgba(20, 20, 20, 0.95); border: 1px solid var(--border-color); backdrop-filter: blur(10px); padding: 2em; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; max-width: 400px; width: 85%; font-family: inherit;">
                    <h3 style="margin-top: 0; color: var(--primary-color); font-family: inherit; font-weight: 600; letter-spacing: 0.5px;">Cargando Direcciones</h3>
                    <p id="progress-status-text" style="color: var(--text-secondary); font-size: 0.95em; word-break: break-all; margin: 15px 0; font-family: inherit;">Iniciando geolocalizaciГіn...</p>
                    <div style="width: 100%; background: rgba(255,255,255,0.05); height: 8px; border-radius: 4px; overflow: hidden;">
                        <div id="progress-bar-fill" style="width: 0%; height: 100%; background: var(--accent-gradient); transition: width 0.3s ease;"></div>
                    </div>
                </div>
            `;
            document.body.appendChild(progressOverlay);
            
            let addedCount = 0;
            let failedList = [];
            
            // CГіrdoba Capital Centroid Coords
            const cbaLat = -31.4167;
            const cbaLon = -64.1833;
            const maxRadiusKm = 15;

            function estaEnZonaPermitida(lat, lon) {
                if (!lat || !lon) return false;
                let dist = getDistanceKm(lat, lon, cbaLat, cbaLon);
                return dist <= maxRadiusKm;
            }

            // Filtrar duplicados locales antes de procesar
            let uniqueAddressesList = [];
            addressesList.forEach(item => {
                let exists = addresses.some(addr => addr.text.toLowerCase() === item.text.toLowerCase());
                let alreadyAdded = uniqueAddressesList.some(addr => addr.text.toLowerCase() === item.text.toLowerCase());
                if (!exists && !alreadyAdded) {
                    uniqueAddressesList.push(item);
                }
            });

            if (uniqueAddressesList.length === 0) {
                document.body.removeChild(progressOverlay);
                targetBtn.disabled = false;
                alert("Todas las direcciones del texto ya se encuentran cargadas en la Hoja de Ruta.");
                return;
            }

            let completedCount = 0;
            document.getElementById('progress-status-text').textContent = `Iniciando geolocalizaciГіn (0/${uniqueAddressesList.length})...`;
            document.getElementById('progress-bar-fill').style.width = "0%";

            // GeolocalizaciГіn en paralelo sГєper rГЎpida con ArcGIS y Photon (y reporte de progreso en tiempo real)
            let geocodePromises = uniqueAddressesList.map(async (item) => {
                let query = normalizarOrtografiaCalle(item.text);
                if (!query.toLowerCase().includes("cГіrdoba") && !query.toLowerCase().includes("cordoba")) {
                    query += ", CГіrdoba, Argentina";
                } else if (!query.toLowerCase().includes("argentina")) {
                    query += ", Argentina";
                }
                
                let result = { item: item, lat: null, lon: null };
                
                // 1. Intentar con ArcGIS
                try {
                    let arcgisUrl = `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates?f=json&singleLine=${encodeURIComponent(query)}&location=${cbaLon},${cbaLat}&distance=15000&maxLocations=1&outFields=*`;
                    let response = await fetch(arcgisUrl);
                    let data = await response.json();
                    if (data.candidates && data.candidates.length > 0) {
                        let candidate = data.candidates[0];
                        if (candidate.score >= 80 && estaEnZonaPermitida(candidate.location.y, candidate.location.x)) {
                            result = {
                                item: item,
                                lat: candidate.location.y,
                                lon: candidate.location.x
                            };
                        }
                    }
                } catch (e) {
                    console.error("Error geocodificando con ArcGIS:", e);
                }

                // 2. Fallback: Intentar con Photon (OSM de alta velocidad) en paralelo
                if (!result.lat || !result.lon) {
                    try {
                        let photonUrl = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lat=${cbaLat}&lon=${cbaLon}&limit=1`;
                        let response = await fetch(photonUrl);
                        let data = await response.json();
                        if (data.features && data.features.length > 0) {
                            let f = data.features[0];
                            let coords = f.geometry.coordinates; // [lon, lat]
                            if (estaEnZonaPermitida(coords[1], coords[0])) {
                                result = {
                                    item: item,
                                    lat: coords[1],
                                    lon: coords[0]
                                };
                            }
                        }
                    } catch (e) {
                        console.error("Error geocodificando con Photon:", e);
                    }
                }

                // 3. Fallback 2: Intentar con Photon quitando nГєmeros (por si es calle sola)
                if (!result.lat || !result.lon) {
                    try {
                        let cleanQuery = item.text.replace(/\d+$/, '').trim();
                        if (cleanQuery && cleanQuery !== item.text) {
                            let fallbackQuery = cleanQuery;
                            if (!fallbackQuery.toLowerCase().includes("cГіrdoba") && !fallbackQuery.toLowerCase().includes("cordoba")) {
                                fallbackQuery += ", CГіrdoba, Argentina";
                            }
                            let photonUrl = `https://photon.komoot.io/api/?q=${encodeURIComponent(fallbackQuery)}&lat=${cbaLat}&lon=${cbaLon}&limit=1`;
                            let response = await fetch(photonUrl);
                            let data = await response.json();
                            if (data.features && data.features.length > 0) {
                                let f = data.features[0];
                                let coords = f.geometry.coordinates; // [lon, lat]
                                if (estaEnZonaPermitida(coords[1], coords[0])) {
                                    result = {
                                        item: item,
                                        lat: coords[1],
                                        lon: coords[0]
                                    };
                                }
                            }
                        }
                    } catch (e) {
                        console.error("Error geocodificando en fallback de Photon:", e);
                    }
                }

                completedCount++;
                let pct = Math.round((completedCount / uniqueAddressesList.length) * 100);
                document.getElementById('progress-bar-fill').style.width = `${pct}%`;
                document.getElementById('progress-status-text').textContent = `Buscando (${completedCount}/${uniqueAddressesList.length}): ${item.text}`;

                return result;
            });

            let results = await Promise.all(geocodePromises);
            
            document.getElementById('progress-bar-fill').style.width = "100%";
            
            // Procesar resultados
            results.forEach(res => {
                if (res.lat && res.lon) {
                    addresses.push({
                        text: res.item.text,
                        client: res.item.client,
                        quantity: res.item.quantity,
                        products: res.item.products,
                        lat: res.lat,
                        lon: res.lon
                    });
                    addedCount++;
                } else {
                    addresses.push({
                        text: res.item.text,
                        client: res.item.client,
                        quantity: res.item.quantity,
                        products: res.item.products,
                        lat: null,
                        lon: null,
                        failedGeocode: true
                    });
                    failedList.push(res.item.text);
                    addedCount++;
                }
            });
            
            document.body.removeChild(progressOverlay);
            targetBtn.disabled = false;
            
            saveAddresses();
            renderList();
            updateMapElements();
            
            document.getElementById('file-word-input').value = '';
            
            if (failedList.length > 0) {
                alert(`ВЎListo! Se procesaron ${addedCount} direcciones.\n\nAtenciГіn: ${failedList.length} direcciones no se pudieron ubicar de forma automГЎtica (marcadas con icono вљ пёЏ en la barra lateral).\n\nPuedes hacer clic en el lГЎpiz para editarlas y agregar detalles.`);
            } else {
                alert(`ВЎListo! Se agregaron con Г©xito las ${addedCount} direcciones del dГ­a.`);
            }
        }

        // Cargar pedidos pendientes desde la planilla de Google Sheets de forma automГЎtica
        async function loadOrdersFromGoogleSheets() {
            if (!googleSheetsAppURL || googleSheetsAppURL === "URL_DE_TU_APPS_SCRIPT") return;
            
            try {
                let response = await fetch(`${googleSheetsAppURL}?_=${Date.now()}`);
                let data = await response.json();
                if (data.status === "success" && data.orders) {
                    // Filtrar pedidos que tengan el estado "Pendiente"
                    let pendingOrders = data.orders.filter(order => order.estado && order.estado.toLowerCase() === "pendiente");
                    
                    // Set de direcciones pendientes de Sheets para bГєsqueda rГЎpida
                    let pendingTexts = new Set(pendingOrders.map(order => {
                        let val = order.direccion || order['direcciГіn'];
                        return val ? val.trim().toLowerCase() : "";
                    }).filter(t => t !== ""));
                    
                    // 1. Filtrar la lista local: eliminar los que fueron importados de Sheets pero ya no figuran allГ­
                    addresses = addresses.filter(addr => {
                        if (addr.rowindex !== undefined) {
                            return pendingTexts.has(addr.text.toLowerCase());
                        }
                        return true; // Conservar las manuales
                    });
                    
                    // 2. Sincronizar rowindices de los existentes y agregar nuevos
                    for (let order of pendingOrders) {
                        let addressVal = order.direccion || order['direcciГіn'];
                        if (!addressVal) continue;
                        
                        let cleanText = addressVal.trim();
                        let cleanLower = cleanText.toLowerCase();
                        
                        let existingIndex = addresses.findIndex(addr => addr.text.toLowerCase() === cleanLower);
                        if (existingIndex !== -1) {
                            // Actualizar rowindex por si cambiГі debido al reacomodo de filas en Sheets
                            addresses[existingIndex].rowindex = order.rowindex;
                            if (!addresses[existingIndex].client && order.cliente) {
                                addresses[existingIndex].client = order.cliente;
                            }
                            if (!addresses[existingIndex].products && order.pedido) {
                                addresses[existingIndex].products = order.pedido;
                            }
                        } else {
                            // Esperar 1 segundo antes de geocodificar para cumplir con la polГ­tica de Nominatim
                            await sleep(1000);
                            // Si no existe localmente, lo geocodificamos y lo agregamos
                            let coords = await geocodeAddress(cleanText);
                            if (coords) {
                                addresses.push({
                                    text: cleanText,
                                    client: order.cliente || 'Manual',
                                    products: order.pedido || '',
                                    lat: coords.lat,
                                    lon: coords.lon,
                                    rowindex: order.rowindex
                                });
                            }
                        }
                    }
                    
                    saveAddresses();
                    renderList();
                    updateMapElements();
                }
            } catch (e) {
                console.error("Error al sincronizar con Google Sheets:", e);
            }
        }

        // Autocompletado estilo Google Maps
        function setupAutocomplete(inputId, dropdownId, onSelect) {
            let input = document.getElementById(inputId);
            let container = input.parentNode;
            
            let dropdown = document.getElementById(dropdownId);
            if (!dropdown) {
                dropdown = document.createElement('div');
                dropdown.id = dropdownId;
                dropdown.className = 'suggestions-dropdown';
                container.appendChild(dropdown);
            }

            let debounceTimer;

            input.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                let query = input.value.trim();
                
                if (query.length < 3) {
                    dropdown.style.display = 'none';
                    return;
                }

                debounceTimer = setTimeout(async function() {
                    let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lat=-31.4167&lon=-64.1833&limit=8`;
                    
                    try {
                        let response = await fetch(url);
                        let data = await response.json();
                        dropdown.innerHTML = '';

                        if (data.features && data.features.length > 0) {
                            data.features.forEach(f => {
                                let props = f.properties;
                                let coords = f.geometry.coordinates; // [lon, lat]
                                
                                let name = props.name || '';
                                let street = props.street || '';
                                let housenumber = props.housenumber || '';
                                let city = props.city || '';
                                let state = props.state || '';
                                
                                // Formatear para Google Maps Style
                                let titleText = street ? (street + (housenumber ? ' ' + housenumber : '')) : name;
                                let subtitleParts = [];
                                if (city) subtitleParts.push(city);
                                if (state) subtitleParts.push(state);
                                let subtitleText = subtitleParts.join(', ');

                                let displayText = titleText + (subtitleText ? ', ' + subtitleText : '');

                                // Filtrar a 15 km a la redonda de CГіrdoba Capital (anillo y alrededores cercanos)
                                let distanceKm = getDistanceKm(coords[1], coords[0], -31.4167, -64.1833);

                                if (distanceKm <= 15) {
                                    let item = document.createElement('div');
                                    item.className = 'suggestion-item';
                                    
                                    item.innerHTML = `
                                        <div class="suggestion-icon">
                                            <i class="fa-solid fa-location-dot"></i>
                                        </div>
                                        <div class="suggestion-content">
                                            <div class="suggestion-title">${titleText}</div>
                                            <div class="suggestion-subtitle">${subtitleText || 'CГіrdoba, Argentina'}</div>
                                        </div>
                                    `;
                                    
                                    item.addEventListener('click', function() {
                                        input.value = displayText;
                                        dropdown.style.display = 'none';
                                        onSelect({
                                            text: displayText,
                                            lat: coords[1],
                                            lon: coords[0]
                                        });
                                    });
                                    dropdown.appendChild(item);
                                }
                            });

                            if (dropdown.children.length > 0) {
                                dropdown.style.display = 'block';
                            } else {
                                dropdown.style.display = 'none';
                            }
                        } else {
                            dropdown.style.display = 'none';
                        }
                    } catch (err) {
                        console.error("Error cargando sugerencias: ", err);
                    }
                }, 250);
            });

            // Cerrar si hace click afuera
            document.addEventListener('click', function(e) {
                if (e.target !== input && e.target !== dropdown && !dropdown.contains(e.target)) {
                    dropdown.style.display = 'none';
                }
            });
        }

        // Auxiliar para separar la lista de productos de forma segura sin romper comas internas en parГ©ntesis (ej: "Garbanzo (2, 5kg)")
        function splitProducts(productsText) {
            if (!productsText) return [];
            
            // Si contiene '|', es formato de Word. Se separa ГљNICAMENTE por '|' para respetar las comas internas.
            if (productsText.includes('|')) {
                return productsText.split('|').map(p => p.trim()).filter(p => p !== "");
            }
            
            // Si es formato Web (Sheets), se separa por comas pero ignorando aquellas que estГ©n dentro de parГ©ntesis.
            let items = [];
            let current = "";
            let parenCount = 0;
            
            for (let i = 0; i < productsText.length; i++) {
                let char = productsText[i];
                if (char === '(') parenCount++;
                else if (char === ')') parenCount--;
                
                if (char === ',' && parenCount === 0) {
                    items.push(current.trim());
                    current = "";
                } else {
                    current += char;
                }
            }
            if (current.trim()) {
                items.push(current.trim());
            }
            return items.filter(p => p !== "");
        }

        // Renderizar Lista Sidebar
        function renderList() {

            addresses.forEach((addr, idx) => {

        // Buscar opciones de calles similares en Photon y abrir menГє
        async function buscarOpcionesYAgregar(text) {
            let cleanText = text.trim();
            if (!cleanText) return;

            // Omitir duplicados locales antes de buscar
            let exists = addresses.some(addr => addr.text.toLowerCase() === cleanText.toLowerCase());
            if (exists) {
                alert("Esta direcciГіn ya estГЎ en la lista.");
                return;
            }

            let addBtn = document.getElementById('add-manual-btn');
            let origHtml = addBtn.innerHTML;
            addBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
            addBtn.disabled = true;

            // Normalizar ortografГ­a antes de consultar a la API
            let normalizedText = normalizarOrtografiaCalle(cleanText);
            let query = normalizedText;
            if (!query.toLowerCase().includes("cГіrdoba") && !query.toLowerCase().includes("cordoba")) {
                query += ", CГіrdoba, Argentina";
            }

            let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lat=-31.4167&lon=-64.1833&limit=5`;
            
            try {
                let response = await fetch(url);
                let data = await response.json();
                
                // Cerrar cualquier menГє de opciones previo
                cerrarMenuOpciones();

                // Filtrar sugerencias
                let suggestions = [];
                if (data.features && data.features.length > 0) {
                    data.features.forEach(f => {
                        let props = f.properties;
                        let coords = f.geometry.coordinates; // [lon, lat]
                        
                        let name = props.name || '';
                        let street = props.street || '';
                        let housenumber = props.housenumber || '';
                        let city = props.city || '';
                        
                        let titleText = street ? (street + (housenumber ? ' ' + housenumber : '')) : name;
                        let displayText = titleText + (city ? `, ${city}` : '');

                        // Restringir a CГіrdoba y cercanГ­as (filtro por distancia 15km)
                        let distanceKm = getDistanceKm(coords[1], coords[0], -31.4167, -64.1833);
                        if (distanceKm <= 15) {
                            // Evitar duplicados en las sugerencias
                            let suggestionExists = suggestions.some(s => s.displayText.toLowerCase() === displayText.toLowerCase());
                            if (!suggestionExists) {
                                suggestions.push({
                                    displayText: displayText,
                                    text: titleText,
                                    lat: coords[1],
                                    lon: coords[0]
                                });
                            }
                        }
                    });
                }

                addBtn.innerHTML = origHtml;
                addBtn.disabled = false;

                // Si encontramos opciones sugeridas, mostramos el mini menГє
                if (suggestions.length > 0) {
                    mostrarMenuOpciones(cleanText, suggestions);
                } else {
                    // Si no hay sugerencias, agregar tal cual como fallo de geolocalizaciГіn
                    addAddressDirectly({
                        text: cleanText,
                        lat: null,
                        lon: null,
                        failedGeocode: true
                    });
                }
            } catch (e) {
                console.error("Error al buscar opciones de calles:", e);
                addBtn.innerHTML = origHtml;
                addBtn.disabled = false;
                // Si falla la API, agregar tal cual
                addAddressDirectly({
                    text: cleanText,
                    lat: null,
                    lon: null,
                    failedGeocode: true
                });
            }
        }

        // Algoritmo TSP (Vecino mГЎs cercano)
        // Algoritmo TSP (Vecino mГЎs cercano + OptimizaciГіn Local 2-Opt para evitar cruces de rutas)
        function optimizeRoute() {
            if (addresses.length <= 1) {
                alert("Necesitas al menos 2 direcciones cargadas para poder optimizar la ruta.");
                return;
            }

            // 1. Fase 1: InicializaciГіn con Vecino mГЎs cercano (Greedy TSP)
            let unvisited = [...addresses];
            let tour = [];
            let currentCoords = { lat: originCoords.lat, lon: originCoords.lon };

            // Filtrar las que tienen coordenadas
            let validStops = unvisited.filter(addr => addr.lat && addr.lon);
            let invalidStops = unvisited.filter(addr => !addr.lat || !addr.lon);

            while (validStops.length > 0) {
                let closestIdx = -1;
                let minDistance = Infinity;

                for (let i = 0; i < validStops.length; i++) {
                    let dist = getDistanceKm(currentCoords.lat, currentCoords.lon, validStops[i].lat, validStops[i].lon);
                    if (dist < minDistance) {
                        minDistance = dist;
                        closestIdx = i;
                    }
                }

                if (closestIdx !== -1) {
                    let nextStop = validStops.splice(closestIdx, 1)[0];
                    tour.push(nextStop);
                    currentCoords = { lat: nextStop.lat, lon: nextStop.lon };
                } else {
                    break;
                }
            }

            // 2. Fase 2: OptimizaciГіn Local 2-Opt para ruta abierta con punto de partida fijo
            let N = tour.length;
            let improved = true;
            
            // FunciГіn para calcular la distancia total de la ruta (abierta, desde el origen)
            function getTourDistance(t) {
                if (t.length === 0) return 0;
                let dist = getDistanceKm(originCoords.lat, originCoords.lon, t[0].lat, t[0].lon);
                for (let i = 0; i < t.length - 1; i++) {
                    dist += getDistanceKm(t[i].lat, t[i].lon, t[i+1].lat, t[i+1].lon);
                }
                return dist;
            }

            let bestDistance = getTourDistance(tour);
            let limitIterations = 500;
            let iter = 0;

            while (improved && iter < limitIterations) {
                improved = false;
                iter++;
                
                for (let i = 0; i < N - 1; i++) {
                    for (let j = i + 1; j < N; j++) {
                        let newTour = [...tour];
                        
                        // InversiГіn en el sub-tour (i a j)
                        let left = i;
                        let right = j;
                        while (left < right) {
                            let temp = newTour[left];
                            newTour[left] = newTour[right];
                            newTour[right] = temp;
                            left++;
                            right--;
                        }

                        let newDist = getTourDistance(newTour);
                        if (newDist < bestDistance - 0.0001) {
                            tour = newTour;
                            bestDistance = newDist;
                            improved = true;
                        }
                    }
                }
            }

            // Concatenar las direcciones vГЎlidas optimizadas y las invГЎlidas al final
            addresses = [...tour, ...invalidStops];
            
            saveAddresses();
            renderList();
            updateMapElements();
        }
