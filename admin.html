        });

        // Lector de archivo de Word/Texto
        document.getElementById('file-word-input').addEventListener('change', function(e) {
            let file = e.target.files[0];
            let nameDisplay = document.getElementById('file-name-display');
            if (!file) {
                if (nameDisplay) nameDisplay.textContent = "NingГєn archivo seleccionado";
                return;
            }
            if (nameDisplay) nameDisplay.textContent = file.name;
            
            let reader = new FileReader();
            
            if (file.name.endsWith('.docx')) {
                loadMammoth(function() {
                    reader.onload = function(event) {
                        let arrayBuffer = event.target.result;
                        mammoth.extractRawText({arrayBuffer: arrayBuffer})
                            .then(function(result) {
                                document.getElementById('text-word-input').value = result.value;
                            })
                            .catch(function(err) {
                                alert("Error al leer el archivo Word: " + err);
                            });
                    };
                    reader.readAsArrayBuffer(file);
                });
            } else {
                reader.onload = function(event) {
                    document.getElementById('text-word-input').value = event.target.result;
                };
                reader.readAsText(file);
            }
        });

        document.getElementById('btn-procesar-texto').addEventListener('click', cargarDireccionesDesdeTexto);
        document.getElementById('origen-save-btn').addEventListener('click', updateOrigin);
        document.getElementById('optimize-btn').addEventListener('click', optimizeRoute);
        document.getElementById('gmaps-btn').addEventListener('click', openGoogleMaps);
        document.getElementById('clear-all-btn').addEventListener('click', () => {
            if (confirm("ВїEstГЎs seguro de que quieres limpiar toda la lista de direcciones?")) {
                let rowIndicesToClear = addresses
                    .filter(addr => addr.rowindex)
                    .map(addr => addr.rowindex);
                
                if (rowIndicesToClear.length > 0) {
                    borrarFilasEnSheets(rowIndicesToClear.join(","));
                }

                addresses = [];
                saveAddresses();
                renderList();
                updateMapElements();
            }
        });

        // Gestos de deslizamiento tГЎctil para abrir/cerrar el menГє lateral en dispositivos mГіviles (filtrando scroll vertical)
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        // Registrar gestos en el documento, el mapa y el sidebar para evitar intercepciones de Leaflet
        const elementsToTrack = [document, document.getElementById('map'), document.getElementById('sidebar')];
        elementsToTrack.forEach(el => {
            if (!el) return;
            el.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });
            
            el.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleSwipe();
            }, { passive: true });
        });

        function handleSwipe() {
            let swipeDistanceX = touchEndX - touchStartX;
            let swipeDistanceY = touchEndY - touchStartY;
            
            // Si el movimiento es predominantemente vertical (scroll en mapa o lista), ignoramos el gesto
            if (Math.abs(swipeDistanceY) > Math.abs(swipeDistanceX)) {
                return;
            }

            let sidebar = document.getElementById('sidebar');
            let toggleBtn = document.getElementById('drawer-toggle');
            if (!sidebar || !toggleBtn) return;

            // Deslizar desde la izquierda hacia la derecha para abrir (umbral amplio para facilitar uso)
            if (swipeDistanceX > 60 && touchStartX < 120) {
                if (!sidebar.classList.contains('open')) {
                    sidebar.classList.add('open');
                    toggleBtn.innerHTML = `<i class="fa-solid fa-xmark"></i>`;
                }
            }
            // Deslizar de derecha a izquierda para cerrar
            if (swipeDistanceX < -60) {
                if (sidebar.classList.contains('open')) {
                    sidebar.classList.remove('open');
                    toggleBtn.innerHTML = `<i class="fa-solid fa-bars"></i>`;
                }
            }
        }
    </script>
</body>
</html>
